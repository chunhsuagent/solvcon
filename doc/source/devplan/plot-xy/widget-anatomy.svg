<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="sans-serif" font-size="12">
  <style>
    .lbl { fill: #8a2222; font-size: 11px; }
    .txt { fill: #333; }
    .tick { stroke: #444; stroke-width: 1; }
    .grid { stroke: #d9d9d9; stroke-width: 1; }
    .frame { fill: none; stroke: #444; stroke-width: 1.2; }
    .guide { stroke: #b06060; stroke-width: 0.8; stroke-dasharray: 3 3; }
  </style>

  <!-- widget boundary -->
  <rect x="10" y="10" width="560" height="380" fill="#fcfcfc"
        stroke="#999" stroke-width="1"/>
  <text x="16" y="26" class="txt">PlotWidget</text>

  <!-- axes rectangle -->
  <rect x="90" y="40" width="440" height="290" class="frame"/>

  <!-- grid + ticks + labels (y) -->
  <line x1="90" y1="110" x2="530" y2="110" class="grid"/>
  <line x1="90" y1="185" x2="530" y2="185" class="grid"/>
  <line x1="90" y1="260" x2="530" y2="260" class="grid"/>
  <line x1="84" y1="110" x2="90" y2="110" class="tick"/>
  <line x1="84" y1="185" x2="90" y2="185" class="tick"/>
  <line x1="84" y1="260" x2="90" y2="260" class="tick"/>
  <text x="58" y="114" class="txt">0.5</text>
  <text x="66" y="189" class="txt">0</text>
  <text x="52" y="264" class="txt">-0.5</text>

  <!-- grid + ticks + labels (x) -->
  <line x1="200" y1="40" x2="200" y2="330" class="grid"/>
  <line x1="310" y1="40" x2="310" y2="330" class="grid"/>
  <line x1="420" y1="40" x2="420" y2="330" class="grid"/>
  <line x1="200" y1="330" x2="200" y2="336" class="tick"/>
  <line x1="310" y1="330" x2="310" y2="336" class="tick"/>
  <line x1="420" y1="330" x2="420" y2="336" class="tick"/>
  <text x="195" y="352" class="txt">2</text>
  <text x="305" y="352" class="txt">4</text>
  <text x="415" y="352" class="txt">6</text>

  <!-- series with a NaN gap -->
  <polyline points="100,250 150,140 200,90 250,120 290,200"
            fill="none" stroke="#1f77b4" stroke-width="2"/>
  <polyline points="370,240 420,280 470,180 520,120"
            fill="none" stroke="#1f77b4" stroke-width="2"/>
  <text x="300" y="235" class="lbl">NaN gap</text>

  <!-- annotations -->
  <line x1="30" y1="185" x2="52" y2="185" class="guide"/>
  <text x="590" y="60" class="lbl">left gutter =</text>
  <text x="590" y="74" class="lbl">widest y label</text>
  <text x="590" y="88" class="lbl">(QFontMetrics)</text>
  <line x1="586" y1="70" x2="70" y2="180" class="guide"/>

  <text x="590" y="130" class="lbl">axes rectangle:</text>
  <text x="590" y="144" class="lbl">grid, frame, and</text>
  <text x="590" y="158" class="lbl">series clipped here</text>
  <line x1="586" y1="140" x2="530" y2="150" class="guide"/>

  <text x="590" y="200" class="lbl">series polyline:</text>
  <text x="590" y="214" class="lbl">QPolygonF runs,</text>
  <text x="590" y="228" class="lbl">split at NaN</text>
  <line x1="586" y1="210" x2="470" y2="180" class="guide"/>

  <text x="590" y="270" class="lbl">bottom gutter =</text>
  <text x="590" y="284" class="lbl">label height +</text>
  <text x="590" y="298" class="lbl">tick + gaps</text>
  <line x1="586" y1="280" x2="420" y2="345" class="guide"/>

  <text x="590" y="340" class="lbl">view limits map to</text>
  <text x="590" y="354" class="lbl">the rectangle via</text>
  <text x="590" y="368" class="lbl">one affine (y flip)</text>
</svg>
